experiment:
  name: mayo_pcdiff
  out_dir: runs/mayo_aapm
  seed: 1234

data:
  dataset: mayo_aapm
  root: data/mayo_aapm
  split: train
  image_size: [256, 256]
  num_workers: 4

ct:
  geometry: parallel
  angles: 180
  det_count: 256
  i0_photons: 1.0e4

diffusion:
  T: 250
  beta_schedule: linear
  beta_start: 1.0e-4
  beta_end: 2.0e-2
  predict: eps

model:
  in_channels: 2
  out_channels: 1
  base_channels: 128
  channel_mult: [1, 1, 2, 2, 4, 4]
  num_res_blocks: 2
  attention_resolutions: [16, 8]
  num_heads: 4
  dropout: 0.0
  use_checkpoint: false

loss:
  physics_weight: 1.0
  perceptual:
    enabled: false
    weight: 0.1
    layers: ["relu2_2", "relu3_3"]

optim:
  lr: 2.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]
  grad_accum_steps: 4
  max_epochs: 200
  early_stop_patience: 25
  save_every_epochs: 10
  scheduler:
    name: ReduceLROnPlateau
    mode: min
    factor: 0.5
    patience: 10
    min_lr: 1.0e-6

train:
  batch_size: 1
  amp: true
  log_every: 50
  val_every_epochs: 1
